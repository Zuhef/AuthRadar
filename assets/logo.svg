<svg width="760" height="200" viewBox="0 0 760 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AuthRadar — authentication-security auditing for modern web apps">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a29"/>
      <stop offset="100%" stop-color="#070f1a"/>
    </linearGradient>
    <radialGradient id="ar-scope" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#11283d"/>
      <stop offset="100%" stop-color="#0a1422"/>
    </radialGradient>
    <linearGradient id="ar-sweep" x1="0.5" y1="0.5" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="70%" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="ar-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="758" height="198" rx="26" fill="url(#bg)" stroke="#15324a" stroke-width="2"/>

  <!-- radar mark, scaled 1.7x from a 64-unit grid, placed at (46,48) -->
  <g transform="translate(46 48) scale(1.7)">
    <circle cx="32" cy="32" r="30" fill="url(#ar-scope)"/>
    <circle cx="32" cy="32" r="29" fill="none" stroke="#235579" stroke-width="2"/>
    <g fill="none" stroke="#2dd4bf" stroke-opacity="0.30">
      <circle cx="32" cy="32" r="22"/>
      <circle cx="32" cy="32" r="14.5"/>
      <circle cx="32" cy="32" r="7"/>
    </g>
    <g stroke="#7dd3fc" stroke-opacity="0.16" stroke-width="1">
      <line x1="32" y1="4" x2="32" y2="60"/>
      <line x1="4" y1="32" x2="60" y2="32"/>
    </g>
    <path d="M32 32 L32 3.5 A28.5 28.5 0 0 1 56.68 18.25 Z" fill="url(#ar-sweep)"/>
    <line x1="32" y1="32" x2="32" y2="3.5" stroke="#5eead4" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="45" cy="19" r="2.7" fill="#fbbf24" filter="url(#ar-glow)"/>
    <circle cx="32" cy="32" r="6.4" fill="#081019"/>
    <g fill="#5eead4">
      <circle cx="32" cy="30.2" r="2.7"/>
      <path d="M30.7 31.4 L33.3 31.4 L34.2 36 L29.8 36 Z"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="208" y="106" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1">
    <tspan fill="#eaf2f8">Auth</tspan><tspan fill="url(#word)">Radar</tspan>
  </text>
  <!-- tagline -->
  <text x="210" y="142" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="21" font-weight="500" fill="#8aa3b8">
    Authentication-security auditing for modern web apps
  </text>
</svg>

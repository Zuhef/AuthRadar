name: New scanner / check proposal
description: Propose a detection for an authentication weakness AuthRadar does not yet cover.
labels: ["scanner", "enhancement"]
body:
  - type: textarea
    id: weakness
    attributes:
      label: Authentication weakness
      description: What weakness should this detect? Link OWASP/CWE references.
      placeholder: "e.g. OAuth 'state' parameter missing -> CSRF on the callback (CWE-352)"
    validations:
      required: true
  - type: textarea
    id: signal
    attributes:
      label: Detection signal
      description: How can it be detected from captured data? Is it passive or active?
    validations:
      required: true
  - type: input
    id: check-id
    attributes:
      label: Proposed check id
      placeholder: "AR-OAUTH-001"
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Likely severity
      options: ["info", "low", "medium", "high", "critical"]
    validations:
      required: false
  - type: textarea
    id: remediation
    attributes:
      label: Remediation guidance
      description: What should developers do to fix it?
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This is a detection (not an exploit) and stays within AuthRadar's defensive scope.
          required: true

name: Bug report
description: Report a defect, crash, or an incorrect finding (false positive/negative).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Do **not** report vulnerabilities in AuthRadar
        itself here — use the private advisory link instead (see `SECURITY.md`).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        The exact command(s) you ran. For target-specific behaviour, describe the
        relevant auth flow rather than sharing real credentials or scanning a
        third party you are not authorized to test.
      placeholder: |
        authradar scan https://my-app.example --active --username alice ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AuthRadar version
      placeholder: "0.1.0  (authradar version)"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Python version & OS
      placeholder: "Python 3.12.4, Ubuntu 24.04"
    validations:
      required: true
  - type: checkboxes
    id: authorized
    attributes:
      label: Authorization
      options:
        - label: I confirm any target referenced here is one I own or am authorized to test.
          required: true
